name: Windows 构建与发布

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: 安装前端依赖
        run: npm ci

      - name: 读取当前版本更新日志
        if: startsWith(github.ref, 'refs/tags/')
        id: changelog
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $escapedVersion = [regex]::Escape($version)
          $content = Get-Content CHANGELOG.md -Raw
          $match = [regex]::Match($content, "(?ms)^##\s+$escapedVersion(?:\s+-[^\r\n]+)?\r?\n(?<body>.*?)(?=^##\s+|\z)")
          if (-not $match.Success -or -not $match.Groups['body'].Value.Trim()) {
            throw "CHANGELOG.md 缺少版本 $version 的更新内容"
          }
          $delimiter = "CHANGELOG_$([guid]::NewGuid().ToString('N'))"
          "body<<$delimiter" >> $env:GITHUB_OUTPUT
          $match.Groups['body'].Value.Trim() >> $env:GITHUB_OUTPUT
          $delimiter >> $env:GITHUB_OUTPUT

      - name: 构建并发布安装版
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: TI工具箱 ${{ github.ref_name }}
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          assetNamePattern: TI-Toolbox_[version]_[platform]_[arch][setup][ext]
          args: --bundles nsis

      - name: 手动构建安装版
        if: github.event_name == 'workflow_dispatch'
        run: npm run tauri build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: 打包便携版
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $portable = "TI-Toolbox_${version}_windows-x64-portable.zip"
          Compress-Archive src-tauri/target/release/ti-toolbox.exe $portable
          "PORTABLE_PATH=$portable" >> $env:GITHUB_ENV

      - name: 保存 Actions 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: TI-Toolbox-Windows-x64
          path: |
            ${{ env.PORTABLE_PATH }}
            src-tauri/target/release/bundle/nsis/*.exe

      - name: 上传便携版到 Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$env:GITHUB_REF_NAME" "$env:PORTABLE_PATH" --clobber

      - name: 验证自动更新清单
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "$env:GITHUB_REF_NAME" --pattern latest.json --dir $env:RUNNER_TEMP --clobber
          $latest = Get-Content (Join-Path $env:RUNNER_TEMP latest.json) -Raw | ConvertFrom-Json
          $expectedVersion = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $windowsPlatforms = @($latest.platforms.PSObject.Properties | Where-Object Name -Like 'windows-*')
          if ($latest.version -ne $expectedVersion -or -not $latest.notes.Trim() -or $windowsPlatforms.Count -eq 0) {
            throw 'latest.json 缺少正确的版本、更新说明或 Windows 安装包信息'
          }
