name: Windows 构建与发布

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: 安装前端依赖
        run: npm ci

      - name: 构建并发布安装版
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: TI工具箱 ${{ github.ref_name }}
          releaseBody: Windows 便携版、安装版与自动更新文件。
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --bundles nsis

      - name: 手动构建安装版
        if: github.event_name == 'workflow_dispatch'
        run: npm run tauri build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: 打包便携版
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $portable = "TI-Toolbox_${version}_windows-x64-portable.zip"
          Compress-Archive src-tauri/target/release/ti-toolbox.exe $portable
          "PORTABLE_PATH=$portable" >> $env:GITHUB_ENV

      - name: 保存 Actions 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: TI-Toolbox-Windows-x64
          path: |
            ${{ env.PORTABLE_PATH }}
            src-tauri/target/release/bundle/nsis/*.exe

      - name: 上传便携版到 Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$env:GITHUB_REF_NAME" "$env:PORTABLE_PATH" --clobber
